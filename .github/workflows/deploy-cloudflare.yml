name: Cloudflareへデプロイ

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  deploy:
    name: Workersへデプロイ
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v6

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 依存関係をインストール
        run: npm install --ignore-scripts

      - name: Wrangler設定を検証
        run: npx wrangler deploy --dry-run

      - name: Cloudflare Workersへデプロイ
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
